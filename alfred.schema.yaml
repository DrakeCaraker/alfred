# Alfred Project Configuration Schema v1.0
# Generated by /bootstrap, lives at .claude/alfred.yaml in user projects
# All hooks read this at runtime instead of hardcoding values

schema_version: "1.0"

project:
  name:
    type: string
    description: "Project name"
  type:
    type: enum
    values: [python, js, ts, rust, go, r, mixed]
    description: "Primary language/framework"

formatting:
  tool:
    type: enum
    values: [ruff, black, prettier, gofmt, rustfmt, none]
    description: "Auto-formatter used by format-on-write hook"

testing:
  command:
    type: string
    description: "Full test command"
    example: "pytest -v"
  fast_command:
    type: string
    description: "Fast subset of tests"
    example: "pytest -m 'not slow'"

ci:
  lint_command:
    type: string
    description: "Lint command for CI"
    example: "make lint"
  typecheck_command:
    type: string
    description: "Type checking command"
    example: "make typecheck"
  source_paths:
    type: list[string]
    description: "Source directories to watch for changes"
    example: ["src/", "tests/"]
  source_glob:
    type: string
    description: "File glob for source files"
    example: "*.py"

protected_files:
  type: list[string]
  description: "Files that should never be auto-modified"
  example: ["notebooks/final.ipynb"]

blocked_extensions:
  type: list[string]
  description: "File extensions blocked from commits"
  example: [".pkl", ".pt"]

max_file_size_mb:
  type: integer
  description: "Maximum file size in MB for commits"
  default: 10

git:
  main_branch:
    type: string
    default: "main"
    description: "Primary branch name"

domain:
  type: object
  description: "Arbitrary keys for project-specific hooks and commands"
