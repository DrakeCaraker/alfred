name: Claude Code Fix

# Manual trigger for complex CI failures or conflicts that scripts can't resolve.
# Requires ANTHROPIC_API_KEY in repository secrets.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
        type: number
      task:
        description: 'What to fix'
        required: true
        type: choice
        options:
          - 'fix-ci'
          - 'resolve-conflicts'
          - 'custom'
      custom_prompt:
        description: 'Custom prompt (only for task=custom)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  claude-fix:
    runs-on: ubuntu-latest
    # Only run if API key is configured
    if: ${{ vars.CLAUDE_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }},
            });
            return { branch: pr.data.head.ref };

      - name: Checkout PR branch
        run: |
          git fetch origin ${{ fromJSON(steps.pr.outputs.result).branch }}
          git checkout ${{ fromJSON(steps.pr.outputs.result).branch }}

      - name: Configure git
        run: |
          git config user.name "alfred-bot"
          git config user.email "alfred-bot@users.noreply.github.com"

      - name: Build prompt
        id: prompt
        run: |
          case "${{ inputs.task }}" in
            fix-ci)
              echo "prompt=The CI workflow failed on this branch. Read .github/workflows/ci.yml to understand the checks, then run 'make check' to reproduce failures. Fix all failures, sync command copies if needed, and commit the fixes. Do not change test expectations — fix the code to pass the existing tests." >> "$GITHUB_OUTPUT"
              ;;
            resolve-conflicts)
              echo "prompt=This branch has merge conflicts with main. Run 'git merge origin/main'. Resolve all conflicts by understanding both sides' intent — the branch has new features, main may have updates. After resolving, run 'make check' to verify, sync command copies, and commit the merge." >> "$GITHUB_OUTPUT"
              ;;
            custom)
              echo "prompt=${{ inputs.custom_prompt }}" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            ${{ steps.prompt.outputs.prompt }}

            After making changes:
            1. Run: make check
            2. If it passes, commit and push
            3. If it fails, fix and retry (max 3 attempts)

            Rules:
            - After editing .claude/commands/*.md, sync to commands/
            - Never put free-text user data in telemetry files
            - Use "habits" not "patterns" in user-facing text
          allowed_tools: "Bash,Read,Write,Edit,Glob,Grep"
          timeout_minutes: 15

      - name: Comment on PR
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ inputs.pr_number }},
              body: '✅ **Claude Code fixed this PR.**\n\nTask: `${{ inputs.task }}`\n\nPlease review the changes before merging.',
            });
