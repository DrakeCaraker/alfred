name: Weekly Security Scan

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 9am UTC
  workflow_dispatch:  # manual trigger

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/*.sh .claude/hooks/*.sh .githooks/*

      - name: Run security audit
        id: audit
        run: |
          if bash scripts/audit.sh > /tmp/audit-output.txt 2>&1; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi
          cat /tmp/audit-output.txt

      - name: Open issue on failure
        if: steps.audit.outputs.passed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/audit-output.txt', 'utf8');

            // Check if an open audit issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'security-audit',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Update existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `## Weekly scan update (${new Date().toISOString().split('T')[0]})\n\n\`\`\`\n${output}\n\`\`\``,
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Security audit failures detected',
                labels: ['security-audit'],
                body: `The weekly security scan found issues:\n\n\`\`\`\n${output}\n\`\`\`\n\nRun \`make audit\` locally to reproduce and fix.\nRun \`make fix\` for sync issues.`,
              });
            }
