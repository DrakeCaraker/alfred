name: Collective Signal Ingest

# Processes encrypted collective learning signals submitted as GitHub issues.
# Users encrypt with the public key (collective/keys/public.pem).
# This workflow decrypts with the private key (repo secret), validates,
# encrypts for storage, and pushes to the private collective repo.

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  ingest:
    # Trigger on title prefix (community users can't add labels)
    if: startsWith(github.event.issue.title, 'collective-signal:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            collective/keys

      - name: Extract encrypted payload from issue body
        id: extract
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const fs = require('fs');

            // Guard: body must be reasonable size (< 65KB) and look like encrypted payload
            if (body.length < 50 || body.length > 65000) {
              core.setOutput('valid', 'false');
              core.setOutput('error', 'Body size out of range.');
              return;
            }

            // Extract encrypted key and data from the issue body
            const keyMatch = body.match(/ENCRYPTED_KEY:\s*\n([\s\S]*?)\nENCRYPTED_DATA:/);
            const dataMatch = body.match(/ENCRYPTED_DATA:\s*\n([\s\S]*?)$/);

            if (!keyMatch || !dataMatch) {
              core.setOutput('valid', 'false');
              core.setOutput('error', 'Missing ENCRYPTED_KEY or ENCRYPTED_DATA sections.');
              return;
            }

            // Write base64 blobs to files for openssl
            fs.writeFileSync('/tmp/aes_key.b64', keyMatch[1].trim());
            fs.writeFileSync('/tmp/signals.b64', dataMatch[1].trim());
            core.setOutput('valid', 'true');

      - name: Comment and close if invalid format
        if: steps.extract.outputs.valid == 'false'
        uses: actions/github-script@v7
        env:
          EXTRACT_ERROR: ${{ steps.extract.outputs.error }}
        with:
          script: |
            const error = process.env.EXTRACT_ERROR || 'Unknown error';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Invalid submission format: ${error}`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Decrypt signals with private key
        if: steps.extract.outputs.valid == 'true'
        id: decrypt
        run: |
          # Write private key from secret
          echo "$ALFRED_COLLECTIVE_PRIVATE_KEY" > /tmp/private.pem

          # Decode base64
          base64 -d /tmp/aes_key.b64 > /tmp/aes_key.enc
          base64 -d /tmp/signals.b64 > /tmp/signals.enc

          # Decrypt AES key with RSA private key
          openssl pkeyutl -decrypt \
            -inkey /tmp/private.pem \
            -in /tmp/aes_key.enc \
            -out /tmp/aes_key.bin

          # Decrypt signals with AES key
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -pass file:/tmp/aes_key.bin \
            -in /tmp/signals.enc \
            -out /tmp/new_signals.json

          # Clean up keys immediately
          rm -f /tmp/private.pem /tmp/aes_key.bin /tmp/aes_key.enc /tmp/signals.enc

          echo "Decrypted successfully"
        env:
          ALFRED_COLLECTIVE_PRIVATE_KEY: ${{ secrets.ALFRED_COLLECTIVE_PRIVATE_KEY }}

      - name: Validate decrypted signals
        if: steps.extract.outputs.valid == 'true'
        id: validate
        run: |
          python3 -c "
          import json, sys

          ALLOWED = ['git_workflow','formatting','testing','code_style','safety','explanation','tooling']

          with open('/tmp/new_signals.json') as f:
              data = json.load(f)

          signals = data.get('signals', [])
          if not signals:
              print('ERROR: empty signals array')
              sys.exit(1)
          if len(signals) > 100:
              print(f'ERROR: too many signals ({len(signals)}, max 100)')
              sys.exit(1)

          for i, s in enumerate(signals):
              if 'category' not in s or 'pattern' not in s:
                  print(f'ERROR: signal {i} missing category or pattern')
                  sys.exit(1)
              if s['category'] not in ALLOWED:
                  print(f'ERROR: signal {i} invalid category: {s[\"category\"]}')
                  sys.exit(1)
              if len(s['pattern']) > 200:
                  print(f'ERROR: signal {i} pattern too long ({len(s[\"pattern\"])} chars)')
                  sys.exit(1)

          print(f'Validated {len(signals)} signals')
          "

      - name: Clone collective repo
        if: steps.extract.outputs.valid == 'true'
        run: |
          git clone --depth 1 \
            "https://x-access-token:${COLLECTIVE_TOKEN}@github.com/DrakeCaraker/alfred-collective.git" \
            /tmp/collective
          mkdir -p /tmp/collective/signals
        env:
          COLLECTIVE_TOKEN: ${{ secrets.ALFRED_COLLECTIVE_TOKEN }}

      - name: Merge and encrypt for storage
        if: steps.extract.outputs.valid == 'true'
        run: |
          BATCH_DATE=$(date +%Y-%m-%d)
          ENC_FILE="/tmp/collective/signals/${BATCH_DATE}.enc"

          python3 -c "
          import json, sys, hashlib, subprocess, os

          enc_file = sys.argv[1]
          new_file = sys.argv[2]
          batch_date = sys.argv[3]

          def signal_id(s):
              raw = s.get('category','') + ':' + s.get('pattern','')[:100].lower()
              return hashlib.sha256(raw.encode()).hexdigest()[:16]

          def decrypt_batch(path):
              result = subprocess.run(
                  ['openssl','enc','-d','-aes-256-cbc','-pbkdf2',
                   '-pass','env:ALFRED_COLLECTIVE_KEY','-in',path],
                  capture_output=True)
              if result.returncode != 0:
                  raise RuntimeError(result.stderr.decode())
              return json.loads(result.stdout)

          with open(new_file) as f:
              new_data = json.load(f)

          existing = {}
          if os.path.isfile(enc_file):
              existing_data = decrypt_batch(enc_file)
              existing = {signal_id(s): s for s in existing_data.get('signals',[])}

          added = updated = 0
          for s in new_data.get('signals',[]):
              sid = signal_id(s)
              if sid in existing:
                  existing[sid]['global_occurrences'] = existing[sid].get('global_occurrences',1) + s.get('local_occurrences',1)
                  levels = {'memory':0,'rule':1,'hook':2}
                  if levels.get(s.get('promoted_to',''),0) > levels.get(existing[sid].get('promoted_to',''),0):
                      existing[sid]['promoted_to'] = s['promoted_to']
                  updated += 1
              else:
                  s['global_occurrences'] = s.get('local_occurrences',1)
                  s['contributed_at'] = batch_date
                  existing[sid] = s
                  added += 1

          output = {'schema_version':'1.0','last_updated':batch_date,'signals':list(existing.values())}
          with open('/tmp/merged_signals.json','w') as f:
              json.dump(output, f, indent=2)

          print(f'{added} new, {updated} updated, {len(existing)} total')
          " "$ENC_FILE" /tmp/new_signals.json "$BATCH_DATE"

          # Encrypt merged signals for storage
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -pass env:ALFRED_COLLECTIVE_KEY \
            -in /tmp/merged_signals.json \
            -out "$ENC_FILE"

          rm -f /tmp/merged_signals.json /tmp/new_signals.json
        env:
          ALFRED_COLLECTIVE_KEY: ${{ secrets.ALFRED_COLLECTIVE_KEY }}

      - name: Commit and push to collective repo
        if: steps.extract.outputs.valid == 'true'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BATCH_DATE=$(date +%Y-%m-%d)
          cd /tmp/collective
          git config user.name "alfred-bot"
          git config user.email "alfred-bot@users.noreply.github.com"
          git add "signals/${BATCH_DATE}.enc"
          git commit -m "signals: ingest ${BATCH_DATE} from issue #${ISSUE_NUMBER}"
          git push

      - name: Comment and close issue
        if: steps.extract.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Signals ingested. Thank you for contributing to Alfred collective learning.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Comment and close on decrypt/validate failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Failed to process signals. The submission may be corrupted or in an unexpected format.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
