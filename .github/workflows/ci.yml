name: Alfred CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install YAML parser
        run: pip install pyyaml

      - name: Check for merge conflict markers
        run: |
          # Build pattern from parts so this file doesn't match itself
          marker="<""<""<""<""<""<""< "
          if grep -rl "$marker" --include="*.md" --include="*.sh" --include="*.json" --include="*.yaml" --include="*.yml" . | grep -v ".git/"; then
            echo "::error::Merge conflict markers found in tracked files"
            exit 1
          fi
          echo "No conflict markers found"

      - name: Validate JSON files
        run: |
          python -m json.tool .claude/settings.json > /dev/null
          python -m json.tool .claude-plugin/plugin.json > /dev/null
          python -m json.tool package.json > /dev/null
          python -m json.tool hooks/hooks.json > /dev/null
          echo "All JSON files valid"

      - name: Validate YAML files
        run: |
          python -c "
          import yaml, sys
          files = [
              'personas/_schema.yaml',
              'personas/_default.yaml',
              'alfred.schema.yaml',
              'collective/signal_schema.yaml',
              'collective/role-categories.yaml',
          ]
          ok = True
          for f in files:
              try:
                  yaml.safe_load(open(f))
                  print(f'{f}: valid')
              except Exception as e:
                  print(f'{f}: INVALID — {e}')
                  ok = False
          if not ok:
              sys.exit(1)
          "

      - name: Check shell script syntax
        run: |
          for sh in .claude/hooks/*.sh .githooks/pre-push .githooks/pre-commit scripts/*.sh; do
            if [ -f "$sh" ]; then
              bash -n "$sh"
              echo "$sh: syntax OK"
            fi
          done

      - name: Lint shell scripts (shellcheck)
        run: |
          sudo apt-get -qq install -y shellcheck > /dev/null 2>&1
          shellcheck -S warning .claude/hooks/*.sh .githooks/pre-push .githooks/pre-commit scripts/smoke-test.sh scripts/aggregate-pilot.sh scripts/pii-scanner.sh

      - name: Verify command copies in sync
        run: |
          out_of_sync=0
          for f in .claude/commands/*.md; do
            base=$(basename "$f")
            if [ -f "commands/$base" ]; then
              if ! diff -q "$f" "commands/$base" > /dev/null 2>&1; then
                echo "::error::commands/$base is out of sync with .claude/commands/$base"
                diff "$f" "commands/$base" | head -20
                out_of_sync=1
              fi
            fi
          done
          if [ "$out_of_sync" -eq 1 ]; then
            echo "Fix: cp .claude/commands/*.md commands/ for each diverged file"
            exit 1
          fi
          echo "All command copies in sync"

      - name: Make scripts executable
        run: chmod +x .claude/hooks/*.sh .githooks/pre-push .githooks/pre-commit scripts/*.sh

      - name: Run smoke test
        run: bash scripts/smoke-test.sh

      - name: Verify aggregate script runs cleanly
        run: bash scripts/aggregate-pilot.sh
