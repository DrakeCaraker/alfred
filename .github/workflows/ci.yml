name: Alfred CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run structural validation (shared with local make validate)
        run: bash scripts/validate.sh

      - name: Lint shell scripts (shellcheck)
        run: |
          sudo apt-get -qq install -y shellcheck > /dev/null 2>&1
          shellcheck -S warning .claude/hooks/*.sh .githooks/pre-push .githooks/pre-commit scripts/smoke-test.sh scripts/aggregate-pilot.sh scripts/pii-scanner.sh scripts/validate.sh scripts/collective-gist.sh

      - name: Make scripts executable
        run: chmod +x .claude/hooks/*.sh .githooks/pre-push .githooks/pre-commit scripts/*.sh

      - name: Run smoke test
        run: bash scripts/smoke-test.sh

      - name: Verify aggregate script runs cleanly
        run: bash scripts/aggregate-pilot.sh
